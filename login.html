<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — TechNova Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body{ min-height:100vh; display:grid; place-items:center; background:var(--grad-soft); position:relative; overflow:hidden; }
  .login-blob{ position:absolute; border-radius:50%; filter:blur(70px); }
  .lb1{ width:440px; height:440px; background:#CDB8FF; top:-160px; right:-120px; opacity:.55; }
  .lb2{ width:380px; height:380px; background:#FFC8B8; bottom:-160px; left:-120px; opacity:.45; }
  .login-card{ position:relative; z-index:1; width:min(420px,92vw); background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); box-shadow:var(--sh-lg); padding:40px; }
  .login-card .brand{ justify-content:center; margin-bottom:8px; }
  .login-card h1{ font-size:26px; text-align:center; }
  .login-card .sub{ text-align:center; color:var(--body); font-size:15px; margin:8px 0 28px; }
  .back{ position:absolute; top:24px; left:24px; z-index:2; display:inline-flex; align-items:center; gap:7px; font-family:var(--font-head); font-weight:600; font-size:14px; color:var(--ink-2); background:#fff; padding:9px 16px; border-radius:999px; box-shadow:var(--sh-sm); }
  .back:hover{ color:var(--primary); }
</style>
</head>
<body>
<span class="login-blob lb1"></span><span class="login-blob lb2"></span>
<a href="index.html" class="back"><svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M19 12H5m6-6-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Back to site</a>

<div class="login-card">
  <a href="index.html" class="brand"><span class="brand-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6l-8-4Z" fill="currentColor" opacity=".25"/><path d="m9 12 2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>TechNova</a>
  <h1>Admin Login</h1>
  <p class="sub">Sign in to manage your site</p>
  <form onsubmit="event.preventDefault(); window.location.href='admin.html';">
    <div class="field"><label>Username</label><input type="text" name="username" placeholder="admin" required></div>
    <div class="field"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px">Log in
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14m-6-6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </form>
</div>
<script src="chatbot.js"></script>
</body>
</html>
